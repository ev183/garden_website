<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta tags for character encoding and responsive design -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Garden Journal | Zone 7A</title>
    <!-- Link to external stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header section with title and navigation -->
    <header>
        <div class="container">
            <!-- Logo and title -->
            <div class="header-content" style="text-align: center;">
                <h1>🌱 My Garden Journal 🌱</h1>
                <p class="subtitle">Growing in Zone 7A</p>
            </div>
            <!-- Navigation menu -->
            <nav>
                <ul>
                    <li><a href="#home" class="active">Home</a></li>
                    <li><a href="#weeks">Weekly Updates</a></li>
                    <li><a href="#Lessons">Lessons Learned</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main content area -->
    <main>
        <!-- Hero section with welcome message -->
        <section id="hero" class="hero">
            <div class="container">
                <h2>Welcome to My Garden</h2>
                <p>Follow along as I document my gardening journey, week by week.</p>
            </div>
        </section>

        <!-- Weekly journal entries section -->
        <section id="weeks" class="weeks-section">
            <div class="container">
                <h2 class="section-title">Weekly Journal</h2>
                
                <!-- Container for week entries populated by JavaScript -->
                <div id="week-entries" class="week-grid">
                    <!-- JavaScript will populate this -->
                </div>
            </div>
        </section>

        <!-- Lessons learned section -->
        <section id="Lessons" class="lessons-section">
            <div class="container">
                <h2 class="section-title">Lessons Learned</h2>
                
                <!-- Container for lesson cards -->
                <div id="lessons-entries" class="lessons-grid">
                    <!-- JavaScript will populate this -->
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; </p>
        </div>
    </footer>

    <!-- Modal popup for displaying week details -->
    <div id="week-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <!-- Modal body for week details populated by JavaScript -->
            <div id="modal-body">
                <!-- Week details will be inserted here -->
            </div>
        </div>
    </div>

    <!-- Link to JavaScript file for interactivity -->
    <script src="script.js"></script>
</body>
</html>
