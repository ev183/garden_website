<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Garden Journal | Zone 7A</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content" style="text-align: center;">
                <h1>🌱 My Garden Journal 🌱</h1>
                <p class="subtitle">Growing in Zone 7A</p>
            </div>
            <nav>
                <ul>
                    <li><a href="#home" class="active">Home</a></li>
                    <li><a href="#weeks">Weekly Updates</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="hero" class="hero">
            <div class="container">
                <h2>Welcome to My Garden</h2>
                <p>Follow along as I document my gardening journey, week by week.</p>
            </div>
        </section>

        <section id="weeks" class="weeks-section">
            <div class="container">
                <h2 class="section-title">Weekly Journal</h2>
                
                <!-- Week entries will be dynamically inserted here -->
                <div id="week-entries" class="week-grid">
                    <!-- JavaScript will populate this -->
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 My Garden Journal. Growing things, one week at a time. 🌿</p>
        </div>
    </footer>

    <!-- Modal for week details -->
    <div id="week-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modal-body">
                <!-- Week details will be inserted here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
